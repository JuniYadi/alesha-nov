name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver component to bump (major, minor, patch)'
        required: true
        default: 'minor'
        type: choice
        options:
          - major
          - minor
          - patch
      first_release:
        description: 'Mark as first release (no previous tag)'
        required: false
        default: 'false'
        type: boolean
      date:
        description: 'Override CalVer date (YYYY.M.D), leave blank for today'
        required: false
        default: ''

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Gate 1: PAT token presence check ─────────────────────────────────
  pat-gate:
    name: PAT Token Gate
    runs-on: ubuntu-latest
    outputs:
      pat_ok: ${{ steps.check.outputs.pat_found }}
    steps:
      - name: Check RELEASE_PAT secret
        id: check
        run: |
          if [[ -n "${{ secrets.RELEASE_PAT }}" ]]; then
            echo "pat_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "pat_found=false" >> "$GITHUB_OUTPUT"
            echo "::error::RELEASE_PAT secret is not set. Go to Settings → Secrets → Actions and add it."
            exit 1
          fi

  # ── Gate 2: Lint ───────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: pat-gate
    if: needs.pat-gate.outputs.pat_ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install ruff
        run: uv pip install ruff

      - name: Run ruff
        run: ruff check .

  # ── Gate 3: Tests ──────────────────────────────────────────────────────
  test:
    name: Test
    needs: pat-gate
    if: needs.pat-gate.outputs.pat_ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Run tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -q --ignore=tests/integration --ignore=tests/e2e --tb=short -n auto
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

  # ── Release: version bump + push + PR ─────────────────────────────────
  release:
    name: Create Release PR
    needs: [pat-gate, lint, test]
    if: |
      needs.pat-gate.outputs.pat_ok == 'true' &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all]"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        run: |
          RELEASE_BRANCH="release/$(date +%Y%m%d)-$(uuidgen | cut -c1-8)"
          echo "release_branch=$RELEASE_BRANCH" >> "$GITHUB_ENV"
          git checkout -b "$RELEASE_BRANCH"

      - name: Run release script (publish)
        run: |
          source .venv/bin/activate
          python scripts/release.py \
            --bump ${{ inputs.bump }} \
            --publish \
            ${{ inputs.first_release == 'true' && '--first-release' || '' }} \
            ${{ inputs.date != '' && format('--date {0}', inputs.date) || '' }}
        env:
          GIT_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Push release branch
        run: git push origin HEAD
        env:
          GIT_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Create PR
        run: |
          bump=${{ inputs.bump }}
          pr_title="Release $(date +%Y.%m.%d) — ${bump} bump"
          body_file=$(mktemp)
          cat > "$body_file" << 'PRBODY'
          ## Release Checklist

          - [ ] Review changelog above
          - [ ] Ensure tests pass
          - [ ] Approve and merge

          ---
          PRBODY
          gh pr create \
            --title "$pr_title" \
            --body-file "$body_file" \
            --base main \
            --head "${{ env.release_branch }}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
