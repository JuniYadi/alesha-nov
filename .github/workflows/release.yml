name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write   # required for OIDC Trusted Publishing

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js for npm publish (OIDC Trusted Publishing)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          # No token secret needed — id-token: write triggers OIDC exchange

      - name: Update npm to latest (OIDC support)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Validate publishing prerequisites (OIDC)
        uses: GarthDB/changesets-publish-validator@v1
        with:
          auth-method: oidc

      - name: Create version PR or publish
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — uses OIDC Trusted Publishing via id-token
