name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Enforce changeset policy
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.sha }}"

          has_package_changes=false
          has_changeset=false

          while IFS= read -r file; do
            case "$file" in
              packages/*)
                if [[ "$file" != packages/*/package.json ]]; then
                  has_package_changes=true
                fi
                ;;
              .changeset/*.md) has_changeset=true ;;
            esac
          done < <(git diff --name-only "$base_sha" "$head_sha")

          if [[ "$has_package_changes" == "true" && "$has_changeset" == "false" ]]; then
            echo "ERROR: Package code changed but no .changeset/*.md file found in PR!"
            exit 1
          fi

          mapfile -t publishable_packages < <(
            node -e '
              const fs = require("fs");
              const path = require("path");
              const packagesDir = "packages";

              for (const entry of fs.readdirSync(packagesDir, { withFileTypes: true })) {
                if (!entry.isDirectory()) continue;

                const packageJsonPath = path.join(packagesDir, entry.name, "package.json");
                if (!fs.existsSync(packageJsonPath)) continue;

                const pkg = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
                if (pkg.name) console.log(pkg.name);
              }
            '
          )

          invalid_changeset_targets=0

          while IFS= read -r file; do
            if [[ "$file" == .changeset/*.md ]]; then
              if [[ ! -f "$file" ]]; then
                continue
              fi

              while IFS= read -r pkg_name; do
                [[ -z "$pkg_name" ]] && continue

                if ! printf '%s\n' "${publishable_packages[@]}" | grep -Fxq "$pkg_name"; then
                  echo "ERROR: $file targets '$pkg_name', but only packages/* workspace names are allowed in changesets."
                  invalid_changeset_targets=1
                fi
              done < <(
                awk '
                  BEGIN { in_frontmatter = 0 }
                  /^---$/ {
                    in_frontmatter = !in_frontmatter
                    next
                  }
                  in_frontmatter && /^"[^"]+"[[:space:]]*:[[:space:]]*(major|minor|patch)$/ {
                    line = $0
                    sub(/^"/, "", line)
                    sub(/"[[:space:]]*:[[:space:]]*(major|minor|patch)$/, "", line)
                    print line
                  }
                ' "$file"
              )
            fi

            if [[ "$file" == packages/*/package.json ]]; then
              status="$(git diff --name-status "$base_sha" "$head_sha" -- "$file" | awk '{print $1}')"

              if [[ "$status" == "A" ]]; then
                continue
              fi

              if git diff "$base_sha" "$head_sha" -- "$file" | grep -Eq '^[+-][[:space:]]*"version"[[:space:]]*:'; then
                echo "ERROR: Manual version edit to $file detected. Package versions should only be changed via changesets!"
                exit 1
              fi
            fi
          done < <(git diff --name-only "$base_sha" "$head_sha")

          if [[ "$invalid_changeset_targets" -eq 1 ]]; then
            exit 1
          fi

          echo "✅ Changeset policy passed."

      - name: Lint all packages
        run: |
          bun run --filter @alesha-nov/config lint && \
          bun run --filter @alesha-nov/db lint && \
          bun run --filter @alesha-nov/email lint && \
          bun run --filter @alesha-nov/auth lint && \
          bun run --filter @alesha-nov/auth-web lint && \
          bun run --filter @alesha-nov/auth-react lint && \
          bun run --filter web lint

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build upstream-first for workspace-linked DTS resolution
      - name: Build packages
        run: |
          bun run --filter @alesha-nov/config build && \
          bun run --filter @alesha-nov/db build && \
          bun run --filter @alesha-nov/email build && \
          bun run --filter @alesha-nov/auth build && \
          bun run --filter @alesha-nov/auth-web build && \
          bun run --filter @alesha-nov/auth-react build && \
          bun run --filter web build

      # Test config, email, auth, auth-web (can run in parallel via root bun test)
      - name: Unit test + coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results coverage

          bun test --coverage --coverage-reporter=lcov --reporter=junit --reporter-outfile=./test-results/junit.xml \
            packages/config/src \
            packages/db/src \
            packages/email/src \
            packages/auth/src \
            packages/auth-web/src

      # auth-react must run in its own package scope to avoid module mock leakage
      - name: Unit test auth-react
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage

          # Run auth-react tests in a single coverage pass to avoid duplicate
          # SF records in lcov that can confuse patch coverage calculation.
          pushd packages/auth-react >/dev/null

          bun test \
            --coverage \
            --coverage-reporter=lcov \
            --coverage-dir ./coverage \
            --preload ./src/test-setup.ts \
            --max-concurrency 1 \
            src/index.test.ts src/auth-guard.test.tsx src/context.test.tsx src/hooks.test.tsx

          popd >/dev/null

          if [[ -f packages/auth-react/coverage/lcov.info ]]; then
            if [[ -f coverage/lcov.info ]]; then
              cat packages/auth-react/coverage/lcov.info >> coverage/lcov.info
            else
              cp packages/auth-react/coverage/lcov.info coverage/lcov.info
            fi
          fi

      # Run web tests (vitest in apps/web)
      - name: Unit test web
        run: bun run --filter web test

      - name: Upload test results to Codecov (Test Analytics)
        if: hashFiles('test-results/junit.xml') != ''
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./test-results/junit.xml
          report_type: test_results
          fail_ci_if_error: true
          verbose: true

      - name: Upload coverage to Codecov
        if: hashFiles('coverage/lcov.info') != ''
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true
          verbose: true
